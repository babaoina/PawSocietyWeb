<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSociety - Users 👥</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            background: #fdf8f4;
            min-height: 100vh;
        }

        .header {
            background: #7A4F2B;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 70px;
            box-shadow: 0 4px 15px rgba(122, 79, 43, 0.2);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .logo span {
            font-weight: 300;
            opacity: 0.9;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .notification-container {
            position: relative;
            cursor: pointer;
        }

        .notification-bell {
            font-size: 24px;
            color: white;
            transition: transform 0.2s;
        }

        .notification-bell:hover {
            transform: scale(1.1);
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            animation: ping 1.5s infinite;
        }

        @keyframes ping {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            cursor: pointer;
        }

        .admin-name {
            text-align: right;
        }

        .admin-name .name {
            font-weight: 600;
        }

        .admin-name .role {
            font-size: 12px;
            opacity: 0.8;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #B88B4A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #ffd89c;
        }

        .avatar:hover {
            background: #DAA520;
            transform: scale(1.05) rotate(5deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(122, 79, 43, 0.15);
            width: 220px;
            display: none;
            z-index: 1001;
            overflow: hidden;
            animation: slideDown 0.3s ease;
            border: 1px solid #ffe4cc;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #4a3b2f;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .dropdown-item:hover {
            background: #fdf1e6;
            color: #7A4F2B;
        }

        .dropdown-item.logout:hover {
            background: #ffe6e6;
            color: #f44336;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding-top: 70px;
        }

        .sidebar {
            width: 260px;
            background: white;
            padding: 25px 0;
            box-shadow: 2px 0 20px rgba(122, 79, 43, 0.05);
            position: fixed;
            height: calc(100vh - 70px);
            overflow-y: auto;
            border-radius: 0 20px 0 0;
        }

        .menu-item {
            padding: 14px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #8b7a6a;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            margin: 5px 0;
            font-weight: 500;
        }

        .menu-item:hover {
            background: #fdf1e6;
            color: #7A4F2B;
            border-left-color: #B88B4A;
        }

        .menu-item.active {
            background: #fdf1e6;
            color: #7A4F2B;
            border-left-color: #7A4F2B;
            font-weight: 600;
        }

        .menu-icon {
            font-size: 22px;
        }

        .main-content {
            flex: 1;
            padding: 35px;
            margin-left: 260px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h2 {
            color: #7A4F2B;
            font-size: 32px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h2 i {
            font-size: 28px;
            color: #B88B4A;
        }

        .stat-badge {
            background: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            color: #7A4F2B;
            font-weight: 500;
            border: 2px solid #ffdec2;
        }

        .stat-badge span {
            color: #B88B4A;
            font-weight: 700;
            margin-right: 5px;
        }

        .search-section {
            background: white;
            padding: 25px 30px;
            border-radius: 60px 60px 30px 30px;
            margin-bottom: 35px;
            border: 2px solid #ffdec2;
            position: relative;
        }

        .search-section::before {
            content: "👥";
            position: absolute;
            top: -15px;
            left: 30px;
            background: #7A4F2B;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input-wrapper {
            flex: 2;
            position: relative;
            min-width: 250px;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #B88B4A;
            font-size: 18px;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #ffdec2;
            border-radius: 50px;
            font-size: 15px;
            background: #fff9f5;
        }

        .search-input-wrapper input:focus {
            outline: none;
            border-color: #B88B4A;
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 14px 25px;
            border: 2px solid #ffdec2;
            border-radius: 50px;
            font-size: 14px;
            color: #7A4F2B;
            font-weight: 500;
            background: white;
            cursor: pointer;
        }

        .filter-select:hover {
            border-color: #B88B4A;
            background: #fff9f5;
        }

        .clear-btn {
            background: #ffe6d9;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: #7A4F2B;
            font-size: 20px;
            cursor: pointer;
            border: 2px solid #ffdec2;
        }

        .clear-btn:hover {
            background: #ffd4bf;
            transform: rotate(90deg);
        }

        .results-count {
            margin: 20px 0 15px;
            color: #7A4F2B;
            font-weight: 500;
        }

        .results-count span {
            background: #ffe6d9;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 600;
        }

        .users-table {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            border: 2px solid #ffdec2;
            margin-bottom: 30px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #fdf1e6;
            color: #7A4F2B;
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }

        td {
            padding: 15px;
            border-bottom: 2px dashed #ffdec2;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: #fff9f5;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #7A4F2B, #B88B4A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            border: 2px solid #ffdec2;
        }

        .user-status {
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-active {
            background: rgba(76, 175, 80, 0.1);
            color: #4caf50;
        }

        .status-suspended {
            background: rgba(244, 67, 54, 0.1);
            color: #f44336;
        }

        .action-icons {
            display: flex;
            gap: 10px;
        }

        .action-icons i {
            cursor: pointer;
            font-size: 18px;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .action-icons i:hover {
            background: #fdf1e6;
            transform: scale(1.1);
        }

        .fa-edit { color: #7A4F2B; }
        .fa-ban { color: #f44336; }
        .fa-check-circle { color: #4caf50; }
        .fa-trash { color: #f44336; }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 30px;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #ffdec2;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 600;
            color: #7A4F2B;
        }

        .page-btn:hover {
            background: #ffefdd;
            transform: scale(1.1);
        }

        .page-btn.active {
            background: #7A4F2B;
            color: white;
            border-color: #7A4F2B;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 40px;
            max-width: 500px;
            width: 90%;
            border: 4px solid #ffdec2;
        }

        .modal-content h3 {
            color: #7A4F2B;
            margin-bottom: 25px;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #7A4F2B;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ffdec2;
            border-radius: 20px;
            font-size: 14px;
            background: #fff9f5;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #B88B4A;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        .btn-save {
            flex: 2;
            background: #7A4F2B;
            color: white;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-cancel {
            flex: 1;
            background: #f0f0f0;
            border: none;
            padding: 14px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-save:hover { background: #B88B4A; }
        .btn-cancel:hover { background: #e0e0e0; }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>PawSociety <span>🐾 Admin</span></h1>
        </div>
        <div class="header-right">
            <div class="notification-container" id="notificationBell" onclick="toggleNotifications()">
                <i class="fas fa-bell notification-bell"></i>
                <span class="notification-badge" id="notificationBadge">0</span>
            </div>
            
            <div class="admin-profile" id="adminProfile">
                <div class="admin-name">
                    <div class="name" id="adminName">Admin User</div>
                    <div class="role" id="adminRole">Super Admin</div>
                </div>
                <div class="avatar" id="avatarBtn">🐶</div>
                
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-item" onclick="window.location.href='settings.html'">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </div>
                    <div class="dropdown-item logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
    <div class="menu-item" onclick="window.location.href='dashboard.html'">
        <i class="fas fa-home menu-icon"></i>
        <span>Dashboard</span>
    </div>
    <div class="menu-item" onclick="window.location.href='posts.html'">
        <i class="fas fa-paw menu-icon"></i>
        <span>Posts</span>
    </div>
    <div class="menu-item" onclick="window.location.href='users.html'">
        <i class="fas fa-user-cog menu-icon"></i>
        <span>Users</span>
    </div>
    <div class="menu-item" onclick="window.location.href='accounts.html'">
        <i class="fas fa-users menu-icon"></i>
        <span>Accounts</span>
    </div>
    <div class="menu-item" onclick="window.location.href='reports.html'">
        <i class="fas fa-chart-bar menu-icon"></i>
        <span>Reports</span>
    </div>
    <div class="menu-item" onclick="window.location.href='settings.html'">
        <i class="fas fa-cog menu-icon"></i>
        <span>Settings</span>
    </div>
</div>

        <div class="main-content">
            <div class="page-header">
                <h2>
                    <i class="fas fa-users"></i>
                    User Management
                </h2>
                <div class="stat-badge">
                    <i class="fas fa-paw"></i> <span id="totalUsers">0</span> Total Users
                </div>
            </div>

            <div class="search-section">
                <div class="search-row">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search users by name or email..." id="searchInput" autocomplete="off">
                    </div>
                    
                    <div class="filter-group">
                        <select class="filter-select" id="roleFilter">
                            <option value="">👤 All Roles</option>
                            <option value="admin">👑 Admin</option>
                            <option value="user">🐾 User</option>
                            <option value="moderator">⭐ Moderator</option>
                        </select>
                        
                        <select class="filter-select" id="statusFilter">
                            <option value="">✨ All Status</option>
                            <option value="Active">🟢 Active</option>
                            <option value="Suspended">🔴 Suspended</option>
                        </select>
                        
                        <button class="clear-btn" onclick="clearFilters()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                
                <div class="results-count" id="resultsCount">
                    <i class="fas fa-paw"></i>
                    <span id="resultCountNumber">0</span> users found
                </div>
            </div>

            <div class="users-table">
                <table>
                    <thead>
                        <tr>
                            <th>User</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Joined</th>
                            <th>Posts</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="usersTableBody">
                        <tr>
                            <td colspan="7" style="text-align: center; padding: 50px;">
                                <i class="fas fa-paw" style="font-size: 40px; color: #B88B4A;"></i>
                                <p style="color: #b5a99c; margin-top: 15px;">Loading cute users...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination">
                <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">4</button>
                <button class="page-btn">5</button>
                <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <div class="modal" id="userModal">
        <div class="modal-content">
            <h3><i class="fas fa-paw"></i> <span id="modalTitle">Edit User</span></h3>
            <input type="hidden" id="userId">
            
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="userName" placeholder="Enter full name">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="userEmail" placeholder="Enter email">
            </div>
            
            <div class="form-group">
                <label>Role</label>
                <select id="userRole">
                    <option value="user">🐾 User</option>
                    <option value="admin">👑 Admin</option>
                    <option value="moderator">⭐ Moderator</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Status</label>
                <select id="userStatus">
                    <option value="Active">🟢 Active</option>
                    <option value="Suspended">🔴 Suspended</option>
                </select>
            </div>
            
            <div class="modal-buttons">
                <button class="btn-save" onclick="saveUser()">Save Changes</button>
                <button class="btn-cancel" onclick="closeModal('userModal')">Cancel</button>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        const avatarBtn = document.getElementById('avatarBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');

        avatarBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!avatarBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownMenu.classList.remove('show');
            }
        });

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUser');
                window.location.href = 'index.html';
            }
        }

        function toggleNotifications() {
            dropdownMenu.classList.toggle('show');
        }

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadUsersData();
            }, 300);
        });

        document.getElementById('roleFilter').addEventListener('change', loadUsersData);
        document.getElementById('statusFilter').addEventListener('change', loadUsersData);

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('roleFilter').value = '';
            document.getElementById('statusFilter').value = '';
            loadUsersData();
        }

        function updateResultsCount(count) {
            document.getElementById('resultCountNumber').textContent = count;
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadUsersData();
            setInterval(loadUsersData, 30000);
        });
    </script>
</body>
</html>
