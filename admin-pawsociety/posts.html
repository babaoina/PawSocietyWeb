<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawSociety - Post Management 🐾</title>
    <!-- Font Awesome for cute icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        body {
            background: #fdf8f4;
            min-height: 100vh;
        }

        .header {
            background: #7A4F2B;
            color: white;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: 70px;
            box-shadow: 0 4px 15px rgba(122, 79, 43, 0.2);
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 600;
        }

        .logo span {
            font-weight: 300;
            opacity: 0.9;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .notification-container {
            position: relative;
            cursor: pointer;
        }

        .notification-bell {
            font-size: 24px;
            color: white;
            transition: transform 0.2s;
        }

        .notification-bell:hover {
            transform: scale(1.1);
        }

        .notification-badge {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid white;
            animation: ping 1.5s infinite;
        }

        @keyframes ping {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .admin-profile {
            display: flex;
            align-items: center;
            gap: 20px;
            position: relative;
            cursor: pointer;
        }

        .admin-name {
            text-align: right;
        }

        .admin-name .name {
            font-weight: 600;
        }

        .admin-name .role {
            font-size: 12px;
            opacity: 0.8;
        }

        .avatar {
            width: 45px;
            height: 45px;
            background: #B88B4A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #ffd89c;
        }

        .avatar:hover {
            background: #DAA520;
            transform: scale(1.05) rotate(5deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(122, 79, 43, 0.15);
            width: 220px;
            display: none;
            z-index: 1001;
            overflow: hidden;
            animation: slideDown 0.3s ease;
            border: 1px solid #ffe4cc;
        }

        .dropdown-menu.show {
            display: block;
        }

        .dropdown-item {
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: #4a3b2f;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .dropdown-item:hover {
            background: #fdf1e6;
            color: #7A4F2B;
        }

        .dropdown-item.logout:hover {
            background: #ffe6e6;
            color: #f44336;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container {
            display: flex;
            min-height: 100vh;
            padding-top: 70px;
        }

        .sidebar {
            width: 260px;
            background: white;
            padding: 25px 0;
            box-shadow: 2px 0 20px rgba(122, 79, 43, 0.05);
            position: fixed;
            height: calc(100vh - 70px);
            overflow-y: auto;
            border-radius: 0 20px 0 0;
        }

        .menu-item {
            padding: 14px 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            color: #8b7a6a;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            margin: 5px 0;
            font-weight: 500;
        }

        .menu-item:hover {
            background: #fdf1e6;
            color: #7A4F2B;
            border-left-color: #B88B4A;
        }

        .menu-item.active {
            background: #fdf1e6;
            color: #7A4F2B;
            border-left-color: #7A4F2B;
            font-weight: 600;
        }

        .menu-icon {
            font-size: 22px;
        }

        .main-content {
            flex: 1;
            padding: 35px;
            margin-left: 260px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h2 {
            color: #7A4F2B;
            font-size: 32px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-header h2 i {
            font-size: 28px;
            color: #B88B4A;
        }

        .post-stats {
            display: flex;
            gap: 15px;
        }

        .stat-badge {
            background: white;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 14px;
            color: #7A4F2B;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(122, 79, 43, 0.05);
            border: 1px solid #ffdec2;
        }

        .stat-badge span {
            color: #B88B4A;
            font-weight: 700;
            margin-right: 5px;
        }

        .search-section {
            background: white;
            padding: 25px 30px;
            border-radius: 60px 60px 30px 30px;
            margin-bottom: 35px;
            box-shadow: 0 10px 30px rgba(122, 79, 43, 0.08);
            border: 2px solid #ffdec2;
            position: relative;
        }

        .search-section::before {
            content: "🐾";
            position: absolute;
            top: -15px;
            left: 30px;
            background: #7A4F2B;
            color: white;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 14px;
        }

        .search-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-input-wrapper {
            flex: 2;
            position: relative;
            min-width: 250px;
        }

        .search-input-wrapper i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #B88B4A;
            font-size: 18px;
        }

        .search-input-wrapper input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid #ffdec2;
            border-radius: 50px;
            font-size: 15px;
            transition: all 0.3s;
            background: #fff9f5;
        }

        .search-input-wrapper input:focus {
            outline: none;
            border-color: #B88B4A;
            box-shadow: 0 0 0 4px rgba(184, 139, 74, 0.1);
        }

        .filter-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 14px 25px;
            border: 2px solid #ffdec2;
            border-radius: 50px;
            font-size: 14px;
            color: #7A4F2B;
            font-weight: 500;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 140px;
        }

        .filter-select:hover {
            border-color: #B88B4A;
            background: #fff9f5;
        }

        .filter-select:focus {
            outline: none;
            border-color: #7A4F2B;
        }

        .clear-btn {
            background: #ffe6d9;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: #7A4F2B;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid #ffdec2;
        }

        .clear-btn:hover {
            background: #ffd4bf;
            transform: rotate(90deg);
        }

        .results-count {
            margin: 20px 0 15px;
            font-size: 16px;
            color: #7A4F2B;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .results-count span {
            background: #ffe6d9;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 600;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .post-card {
            background: white;
            border-radius: 35px 35px 25px 25px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(122, 79, 43, 0.08);
            transition: all 0.3s;
            border: 2px solid #ffdec2;
            position: relative;
        }

        .post-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(122, 79, 43, 0.15);
            border-color: #B88B4A;
        }

        .post-image {
            height: 200px;
            background: #ffefdd;
            position: relative;
            overflow: hidden;
        }

        .post-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .post-card:hover .post-image img {
            transform: scale(1.05);
        }

        .post-status-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 700;
            color: white;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .status-lost { background: #f44336; }
        .status-found { background: #4caf50; }
        .status-adoption { background: #2196f3; }

        .post-content {
            padding: 22px;
        }

        .post-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .post-user-avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #7A4F2B, #B88B4A);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 18px;
            border: 2px solid #ffdec2;
        }

        .post-user-info {
            flex: 1;
        }

        .post-user-name {
            font-weight: 600;
            color: #4a3b2f;
            font-size: 16px;
        }

        .post-time {
            font-size: 12px;
            color: #b5a99c;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .post-title {
            font-size: 24px;
            font-weight: 700;
            color: #7A4F2B;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .post-title i {
            font-size: 20px;
            color: #B88B4A;
        }

        .post-description {
            background: #fff9f5;
            padding: 15px;
            border-radius: 20px;
            margin: 15px 0;
            border: 1px dashed #ffdec2;
        }

        .description-label {
            font-size: 12px;
            color: #B88B4A;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .description-label i {
            font-size: 14px;
        }

        .description-text {
            color: #5a4b3a;
            font-size: 14px;
            line-height: 1.6;
            font-style: italic;
        }

        .post-meta {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 15px 0;
        }

        .meta-item {
            background: #fff9f5;
            padding: 10px 12px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #ffdec2;
        }

        .meta-icon {
            width: 32px;
            height: 32px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7A4F2B;
            font-size: 16px;
        }

        .meta-content {
            flex: 1;
        }

        .meta-label {
            font-size: 10px;
            color: #b5a99c;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .meta-value {
            font-size: 14px;
            font-weight: 600;
            color: #4a3b2f;
        }

        .reported-badge {
            background: #fff2e6;
            padding: 8px 15px;
            border-radius: 30px;
            font-size: 13px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
            border: 1px solid #ffb08e;
            color: #f57c00;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .reported-badge:hover {
            background: #ffe4d6;
            transform: scale(1.02);
        }

        .post-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 18px;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .btn-view {
            background: #7A4F2B;
            color: white;
        }

        .btn-view:hover {
            background: #B88B4A;
            transform: scale(0.98);
        }

        .btn-flag {
            background: #ff9800;
            color: white;
        }

        .btn-flag:hover {
            background: #f57c00;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #d32f2f;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(5px);
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 35px;
            border-radius: 40px;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            border: 4px solid #ffdec2;
            position: relative;
        }

        .modal-content h3 {
            color: #7A4F2B;
            margin-bottom: 25px;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .close-btn {
            background: #7A4F2B;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            border: 2px solid #ffdec2;
        }

        .close-btn:hover {
            background: #B88B4A;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }

        .page-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #ffdec2;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 600;
            color: #7A4F2B;
            transition: all 0.2s;
        }

        .page-btn:hover {
            background: #ffefdd;
            transform: scale(1.1);
        }

        .page-btn.active {
            background: #7A4F2B;
            color: white;
            border-color: #7A4F2B;
        }

        .loading-spinner {
            text-align: center;
            padding: 50px;
        }

        .loading-spinner i {
            font-size: 40px;
            color: #B88B4A;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes slideOut {
            from {
                transform: translateX(0);
                opacity: 1;
            }
            to {
                transform: translateX(100%);
                opacity: 0;
            }
        }

        #toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <h1>PawSociety <span>🐾 Admin</span></h1>
        </div>
        <div class="header-right">
            <div class="notification-container" id="notificationBell" onclick="toggleNotifications()">
                <i class="fas fa-bell notification-bell"></i>
                <span class="notification-badge" id="notificationBadge">0</span>
            </div>
            
            <div class="admin-profile" id="adminProfile">
                <div class="admin-name">
                    <div class="name" id="adminName">Admin User</div>
                    <div class="role" id="adminRole">Super Admin</div>
                </div>
                <div class="avatar" id="avatarBtn">🐶</div>
                
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-item" onclick="window.location.href='settings.html'">
                        <i class="fas fa-cog"></i>
                        <span>Settings</span>
                    </div>
                    <div class="dropdown-item logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                        <span>Logout</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="menu-item" onclick="window.location.href='dashboard.html'">
                <i class="fas fa-home menu-icon"></i>
                <span>Dashboard</span>
            </div>
            <div class="menu-item active" onclick="window.location.href='posts.html'">
                <i class="fas fa-paw menu-icon"></i>
                <span>Posts</span>
            </div>
            <div class="menu-item" onclick="window.location.href='users.html'">
                <i class="fas fa-users menu-icon"></i>
                <span>Users</span>
            </div>
            <div class="menu-item" onclick="window.location.href='reports.html'">
                <i class="fas fa-chart-bar menu-icon"></i>
                <span>Reports</span>
            </div>
            <div class="menu-item" onclick="window.location.href='settings.html'">
                <i class="fas fa-cog menu-icon"></i>
                <span>Settings</span>
            </div>
        </div>

        <div class="main-content">
            <div class="page-header">
                <h2>
                    <i class="fas fa-paw"></i>
                    Post Management
                </h2>
                <div class="post-stats">
                    <div class="stat-badge"><i class="fas fa-paw"></i> <span id="totalPosts">0</span> Total</div>
                    <div class="stat-badge"><i class="fas fa-flag"></i> <span id="reportedPosts">0</span> Reported</div>
                </div>
            </div>

            <div class="search-section">
                <div class="search-row">
                    <div class="search-input-wrapper">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search by pet name, location, user..." id="searchInput" autocomplete="off">
                    </div>
                    
                    <div class="filter-group">
                        <select class="filter-select" id="statusFilter">
                            <option value="">🐾 All Status</option>
                            <option value="lost">🔴 Lost</option>
                            <option value="found">🟢 Found</option>
                            <option value="adoption">🔵 Adoption</option>
                        </select>
                        
                        <select class="filter-select" id="dateFilter">
                            <option value="">📅 All Time</option>
                            <option value="today">Today</option>
                            <option value="week">This Week</option>
                            <option value="month">This Month</option>
                            <option value="year">This Year</option>
                        </select>
                        
                        <button class="clear-btn" onclick="clearFilters()" title="Clear filters">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                
                <div class="results-count" id="resultsCount">
                    <i class="fas fa-paw"></i>
                    <span id="resultCountNumber">0</span> posts found
                </div>
            </div>

            <div class="posts-grid" id="postsGrid">
                <div class="loading-spinner">
                    <i class="fas fa-spinner"></i>
                    <p style="color: #B88B4A; margin-top: 15px;">Loading cute posts...</p>
                </div>
            </div>

            <div class="pagination" id="pagination">
                <button class="page-btn"><i class="fas fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn">2</button>
                <button class="page-btn">3</button>
                <button class="page-btn">4</button>
                <button class="page-btn">5</button>
                <button class="page-btn"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
    </div>

    <div class="modal" id="viewPostModal">
        <div class="modal-content">
            <h3><i class="fas fa-paw"></i> Post Details</h3>
            <div id="modalContent"></div>
            <button class="close-btn" onclick="closeModal('viewPostModal')">
                <i class="fas fa-heart"></i> Close
            </button>
        </div>
    </div>

    <div class="modal" id="reportModal">
        <div class="modal-content">
            <div id="reportModalContent"></div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script>
        const avatarBtn = document.getElementById('avatarBtn');
        const dropdownMenu = document.getElementById('dropdownMenu');

        avatarBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });

        document.addEventListener('click', function(e) {
            if (!avatarBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownMenu.classList.remove('show');
            }
        });

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('adminToken');
                localStorage.removeItem('adminUser');
                window.location.href = 'index.html';
            }
        }

        function toggleNotifications() {
            dropdownMenu.classList.toggle('show');
        }

        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                loadPostsData();
            }, 300);
        });

        document.getElementById('statusFilter').addEventListener('change', loadPostsData);
        document.getElementById('dateFilter').addEventListener('change', loadPostsData);

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('dateFilter').value = '';
            loadPostsData();
        }

        function updateResultsCount(count) {
            const countElement = document.getElementById('resultCountNumber');
            if (countElement) {
                countElement.textContent = count;
            }
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }

        document.addEventListener('DOMContentLoaded', function() {
            loadPostsData();
            setInterval(loadPostsData, 10000);
        });
    </script>
</body>
</html>
